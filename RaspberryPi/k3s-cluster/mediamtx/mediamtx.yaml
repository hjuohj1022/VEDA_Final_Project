# -----------------------------------------------------------
# 설정 저장소 (ConfigMap) - 한화비전 전용 FFmpeg 모드
# -----------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
data:
  mediamtx.yml: |
    paths:
      # [채널 0]
      "0":
        source: publisher
        runOnInit: >
          ffmpeg -hide_banner -loglevel error
          -rtsp_transport tcp
          -i rtsp://admin:team6cam%21@192.168.50.5/0/H.264/media.smp
          -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
        runOnInitRestart: yes
        record: yes
        recordPath: /recordings/%path_%Y-%m-%d_%H-%M-%S
        recordFormat: fmp4
        recordPartDuration: 10s
        recordDeleteAfter: 25s

      # [채널 1]
      "1":
        source: publisher
        runOnInit: >
          ffmpeg -hide_banner -loglevel error
          -rtsp_transport tcp
          -i rtsp://admin:team6cam%21@192.168.50.5/1/H.264/media.smp
          -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
        runOnInitRestart: yes
        record: yes
        recordPath: /recordings/%path_%Y-%m-%d_%H-%M-%S
        recordFormat: fmp4
        recordPartDuration: 10s
        recordDeleteAfter: 25s

      # [채널 2]
      "2":
        source: publisher
        runOnInit: >
          ffmpeg -hide_banner -loglevel error
          -rtsp_transport tcp
          -i rtsp://admin:team6cam%21@192.168.50.5/2/H.264/media.smp
          -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
        runOnInitRestart: yes
        record: yes
        recordPath: /recordings/%path_%Y-%m-%d_%H-%M-%S
        recordFormat: fmp4
        recordPartDuration: 10s
        recordDeleteAfter: 25s

      # [채널 3]
      "3":
        source: publisher
        runOnInit: >
          ffmpeg -hide_banner -loglevel error
          -rtsp_transport tcp
          -i rtsp://admin:team6cam%21@192.168.50.5/3/H.264/media.smp
          -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
        runOnInitRestart: yes
        record: yes
        recordPath: /recordings/%path_%Y-%m-%d_%H-%M-%S
        recordFormat: fmp4
        recordPartDuration: 10s
        recordDeleteAfter: 25s

---
# -----------------------------------------------------------
# 배포 명세서 (Deployment) - FFmpeg 이미지 필수
# -----------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx-server 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediamtx      
  template:
    metadata:
      labels:
        app: mediamtx    
    spec:
      hostNetwork: true
      
      nodeSelector:
        kubernetes.io/hostname: pi-worker1
      
      containers:
      - name: mediamtx          
        image: bluenviron/mediamtx:latest-ffmpeg         
        
        ports:
        - containerPort: 8554
        - containerPort: 1935
        - containerPort: 8888
        - containerPort: 8889
        
        volumeMounts:
        - name: config-volume
          mountPath: /mediamtx.yml
          subPath: mediamtx.yml
          
        - name: recordings
          mountPath: /recordings
          
      volumes:
      - name: config-volume
        configMap:
          name: mediamtx-config
          
      - name: recordings
        persistentVolumeClaim:
          claimName: recording-pvc

---
# -----------------------------------------------------------
# 외부 접속 연결 (Service)
# -----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: mediamtx-service
spec:
  type: LoadBalancer
  
  # RTSP 스트리밍 성능 최적화 (불필요한 네트워크 점프 방지)
  externalTrafficPolicy: Cluster
  
  selector:
    app: mediamtx  
  ports:
    - name: rtsp
      protocol: TCP
      port: 8554
      targetPort: 8554
      
    - name: rtmp
      protocol: TCP
      port: 1935
      targetPort: 1935
      
    - name: hls
      protocol: TCP
      port: 8888
      targetPort: 8888
      
    - name: webrtc
      protocol: TCP
      port: 8889
      targetPort: 8889