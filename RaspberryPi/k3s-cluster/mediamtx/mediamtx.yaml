# -----------------------------------------------------------
# 설정 저장소 (ConfigMap)
# -----------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
data:
  mediamtx.yml: |
    # RTSP 설정 (내부 통신용으로 제한)
    rtsp: yes
    rtspAddress: 127.0.0.1:8554
    
    # RTSPS 보안 설정 (외부 노출용)
    encryption: strict
    rtspsAddress: :8555
    serverCert: /etc/mediamtx/certs/server.crt
    serverKey: /etc/mediamtx/certs/server.key

    # 공통 인증 설정 (모든 path에 적용)
    # Jenkins에서 ${MTX_READ_USER}, ${MTX_READ_PASS 실제 값으로 치환됨}
    pathDefaults:
      readUser: ${MTX_READ_USER}
      readPass: ${MTX_READ_PASS}

    paths:
      # [채널 0 - Main]
      "0/main":
        source: publisher
        # $CAMERA_USER, $CAMERA_PASSWORD, $CAMERA_IP 변수 사용으로 하드코딩 방지
        runOnInit: ffmpeg -hide_banner -loglevel error -rtsp_transport tcp -i rtsp://$CAMERA_USER:$CAMERA_PASSWORD@$CAMERA_IP/0/H.264/media.smp -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/0/main
        runOnInitRestart: yes
        record: yes
        recordPath: /recordings/%path_%Y-%m-%d_%H-%M-%S
        recordFormat: fmp4
        # 5분마다 파일 생성
        recordSegmentDuration: 5m

      # [채널 0 - Sub]
      "0/sub":
        source: publisher
        # 저해상도 서브 스트림 생성 (그리드용)
        runOnInit: ffmpeg -hide_banner -loglevel error -rtsp_transport tcp -i rtsp://$CAMERA_USER:$CAMERA_PASSWORD@$CAMERA_IP/0/MOBILE/media.smp -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/0/sub
        runOnInitRestart: yes
        # 서브 스트림은 녹화 비활성화
        record: no

      # [채널 1 - Main]
      "1/main":
        source: publisher
        runOnInit: ffmpeg -hide_banner -loglevel error -rtsp_transport tcp -i rtsp://$CAMERA_USER:$CAMERA_PASSWORD@$CAMERA_IP/1/H.264/media.smp -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/1/main
        runOnInitRestart: yes
        record: yes
        recordPath: /recordings/%path_%Y-%m-%d_%H-%M-%S
        recordFormat: fmp4
        recordSegmentDuration: 5m

      # [채널 1 - Sub]
      "1/sub":
        source: publisher
        runOnInit: ffmpeg -hide_banner -loglevel error -rtsp_transport tcp -i rtsp://$CAMERA_USER:$CAMERA_PASSWORD@$CAMERA_IP/1/MOBILE/media.smp -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/1/sub
        runOnInitRestart: yes
        record: no

      # [채널 2 - Main]
      "2/main":
        source: publisher
        runOnInit: ffmpeg -hide_banner -loglevel error -rtsp_transport tcp -i rtsp://$CAMERA_USER:$CAMERA_PASSWORD@$CAMERA_IP/2/H.264/media.smp -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/2/main
        runOnInitRestart: yes
        record: yes
        recordPath: /recordings/%path_%Y-%m-%d_%H-%M-%S
        recordFormat: fmp4
        recordSegmentDuration: 5m

      # [채널 2 - Sub]
      "2/sub":
        source: publisher
        runOnInit: ffmpeg -hide_banner -loglevel error -rtsp_transport tcp -i rtsp://$CAMERA_USER:$CAMERA_PASSWORD@$CAMERA_IP/2/MOBILE/media.smp -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/2/sub
        runOnInitRestart: yes
        record: no

      # [채널 3 - Main]
      "3/main":
        source: publisher
        runOnInit: ffmpeg -hide_banner -loglevel error -rtsp_transport tcp -i rtsp://$CAMERA_USER:$CAMERA_PASSWORD@$CAMERA_IP/3/H.264/media.smp -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/3/main
        runOnInitRestart: yes
        record: yes
        recordPath: /recordings/%path_%Y-%m-%d_%H-%M-%S
        recordFormat: fmp4
        recordSegmentDuration: 5m

      # [채널 3 - Sub]
      "3/sub":
        source: publisher
        runOnInit: ffmpeg -hide_banner -loglevel error -rtsp_transport tcp -i rtsp://$CAMERA_USER:$CAMERA_PASSWORD@$CAMERA_IP/3/MOBILE/media.smp -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/3/sub
        runOnInitRestart: yes
        record: no

---
# -----------------------------------------------------------
# 배포 명세서 (Deployment)
# -----------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
    spec:
      nodeSelector:
        kubernetes.io/hostname: pi-worker1

      containers:
      # MediaMTX 서버
      - name: mediamtx
        image: bluenviron/mediamtx:latest-ffmpeg

        # 카메라 접속 정보 암호화 (젠킨스에서 실제 값으로 치환됨)
        env:
        - name: CAMERA_IP
          value: "__CAMERA_IP__"
        - name: CAMERA_USER
          value: "__CAMERA_USER__"
        - name: CAMERA_PASSWORD
          value: "__CAMERA_PASSWORD__"

        ports:
        - containerPort: 8555
        - containerPort: 1935
        - containerPort: 8888
        - containerPort: 8889
        - containerPort: 8000
          protocol: UDP
        - containerPort: 8001
          protocol: UDP

        volumeMounts:
        - name: config-volume
          mountPath: /mediamtx.yml
          subPath: mediamtx.yml

        - name: certs
          mountPath: /etc/mediamtx/certs
          readOnly: true

        - name: recordings
          mountPath: /recordings

      volumes:
      - name: config-volume
        configMap:
          name: mediamtx-config

      - name: certs
        secret:
          secretName: nginx-certs

      - name: recordings
        # PVC 대신 호스트 경로 직접 사용
        hostPath:
          path: /home/pi/cctv-recordings
          type: DirectoryOrCreate

---
# -----------------------------------------------------------
# 서비스 (Service) - MetalLB LoadBalancer
# -----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: mediamtx-service
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: mediamtx
  ports:
    - name: rtsps
      protocol: TCP
      port: 8555
      targetPort: 8555

    - name: rtmp
      protocol: TCP
      port: 1935
      targetPort: 1935

    - name: hls
      protocol: TCP
      port: 8888
      targetPort: 8888

    - name: webrtc
      protocol: TCP
      port: 8889
      targetPort: 8889
