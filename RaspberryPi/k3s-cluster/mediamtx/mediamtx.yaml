# 1. 프로그램 배포 (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx-server # Jenkinsfile과 이름 통일 추천
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
    spec:
      containers:
      - name: mediamtx
        image: hjuohj/mediamtx-server:latest 
        imagePullPolicy: Always # 항상 새로운 이미지를 받도록 강제
        ports:
        - containerPort: 8554
        - containerPort: 1935
        - containerPort: 8888

---
apiVersion: v1
kind: Service
metadata:
  name: mediamtx-service
spec:
  type: LoadBalancer
  selector:
    app: mediamtx
  ports:
    - name: rtsp
      port: 8554
      targetPort: 8554
    - name: rtmp
      port: 1935
      targetPort: 1935
    - name: hls
      port: 8888
      targetPort: 8888