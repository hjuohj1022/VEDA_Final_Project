worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # [Security] Nginx 버전 노출 최소화
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # [Security] SSL/TLS 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    upstream crow_backend {
        server crow-server-service:8080;
    }

    upstream mediamtx_hls {
        server mediamtx-service:8888;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_client_certificate /etc/nginx/certs/rootCA.crt;

        # [Security] mTLS 강제
        ssl_verify_client on;

        # [Security] 보안 헤더
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # [수정] 웹소켓 전용 설정은 일반 location보다 먼저 배치
        location /thermal-stream {
            proxy_pass http://crow_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 스트림 연결 유지 시간 (1시간)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 추가: SUNAPI 요청은 Crow 서버로 전달 (카메라 실주소/계정은 Crow 내부에서만 사용)
        location /sunapi/StreamingServer {
            proxy_pass http://crow_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Device-Verify $ssl_client_verify;
            proxy_set_header X-Device-ID $ssl_client_s_dn;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # 추가: SUNAPI HTTP(CGI) 요청은 Crow 서버로 전달
        location /sunapi/ {
            proxy_pass http://crow_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Device-Verify $ssl_client_verify;
            proxy_set_header X-Device-ID $ssl_client_s_dn;

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
        }

        location / {
            proxy_set_header X-Device-Verify $ssl_client_verify;
            proxy_set_header X-Device-ID $ssl_client_s_dn;
            proxy_pass http://crow_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /hls/ {
            proxy_pass http://mediamtx_hls/;
            proxy_set_header Host $host;
            # HLS 요청에도 클라이언트 인증 결과를 전달
            proxy_set_header X-Client-Verify $ssl_client_verify;
        }
    }

    # HTTP -> HTTPS 리다이렉트
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}

stream {
    upstream mediamtx_rtsp {
        server mediamtx-service:8554;
    }

    upstream mosquitto_backend {
        server mqtt-service:1883;
    }

    # MQTT with mTLS
    server {
        listen 8883 ssl;
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_client_certificate /etc/nginx/certs/rootCA.crt;
        ssl_verify_client on;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        proxy_pass mosquitto_backend;
    }

    # RTSP with SSL (RTSPS)
    # 클라이언트 RTSPS 지원 여부 확인 필요
    server {
        listen 8555 ssl; # 보안 RTSP 포트
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_client_certificate /etc/nginx/certs/rootCA.crt;
        ssl_verify_client on;

        proxy_pass mediamtx_rtsp;
    }

    # 기존 RTSP (비보안) - 내부망 전용 권장
    server {
        listen 8554;
        proxy_pass mediamtx_rtsp;
    }
}
