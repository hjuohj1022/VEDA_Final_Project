# 1. 설정 파일 정의 (ConfigMap)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
data:
  mosquitto.conf: |
    # 비보안 연결 (내부 Nginx 중계용)
    listener 1883
    allow_anonymous true

    # 보안 연결 (직접 접속용)
    listener 8883
    cafile /mosquitto/certs/ca.crt
    certfile /mosquitto/certs/server.crt
    keyfile /mosquitto/certs/server.key
    require_certificate true
    use_identity_as_username true
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout

---
# 2. 실행 명세서 (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt
  template:
    metadata:
      labels:
        app: mqtt
    spec:
      containers:
      - name: mqtt
        image: hjuohj/mqtt-broker:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 1883
        - containerPort: 8883
        volumeMounts:
        - name: config-volume
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
        - name: certs-volume
          mountPath: /mosquitto/certs
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: mosquitto-config
      - name: certs-volume
        secret:
          secretName: mqtt-certs

---
# 3. 서비스 (Service) - MetalLB LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: mqtt-service
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: mqtt
  ports:
    - name: mqtt-tcp
      protocol: TCP
      port: 1883
      targetPort: 1883
    - name: mqtt-ssl
      protocol: TCP
      port: 8883
      targetPort: 8883