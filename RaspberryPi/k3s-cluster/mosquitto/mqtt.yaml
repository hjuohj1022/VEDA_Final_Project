# 1. 설정 파일 정의 (ConfigMap)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
data:
  mosquitto.conf: |
    listener 8883
    cafile /mosquitto/certs/ca.crt
    certfile /mosquitto/certs/server.crt
    keyfile /mosquitto/certs/server.key
    require_certificate true
    use_identity_as_username true
    allow_anonymous false
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout

---
# 2. 실행 명세서 (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt
  template:
    metadata:
      labels:
        app: mqtt
    spec:
      containers:
      - name: mqtt
        image: hjuohj/mqtt-broker:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8883
        volumeMounts:
        - name: config-volume
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
        - name: certs-volume
          mountPath: /mosquitto/certs
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: mosquitto-config
      - name: certs-volume
        secret:
          secretName: mqtt-certs

---
# 3. 내부 전용 서비스 (Service)
apiVersion: v1
kind: Service
metadata:
  name: mqtt-service
spec:
  type: ClusterIP  # 내부 IP만 사용
  selector:
    app: mqtt
  ports:
    - protocol: TCP
      port: 8883
      targetPort: 8883