apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-init-sql
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
        id VARCHAR(50) PRIMARY KEY,
        password VARCHAR(255) NOT NULL,
        two_factor_enabled TINYINT(1) NOT NULL DEFAULT 0,
        totp_secret VARCHAR(64) NULL,
        totp_pending_secret VARCHAR(64) NULL,
        totp_pending_expires_at DATETIME NULL,
        totp_last_used_step BIGINT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- test 계정이 없을 경우에만 삽입 (기본 관리자)
    INSERT IGNORE INTO users (id, password) VALUES ('test', 'test');
