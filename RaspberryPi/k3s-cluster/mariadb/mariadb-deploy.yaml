apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      # [�ٽ� ����] �����Ͱ� �ƴ� '������ ���� ��Ŀ ���'�� ����
      nodeSelector:
        kubernetes.io/hostname: pi-worker2

      # [������] tolerations �κ� (��Ŀ ��忣 �ʿ� ����)
      
      containers:
      - name: mariadb
        image: hjuohj/mariadb-server:latest
        imagePullPolicy: Always  
        
        # [���� ����] �ѱ�/�̸��� �Ϻ� ����
        args:
          - "--character-set-server=utf8mb4"
          - "--collation-server=utf8mb4_unicode_ci"
        
        ports:
        - containerPort: 3306
        env:
        # [���� ����] �ѱ� �ð�(KST)
        - name: TZ
          value: Asia/Seoul
          
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: root-password
        - name: MARIADB_DATABASE
          value: "veda_db"
        - name: MARIADB_USER
          value: "veda_user"
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: user-password
        volumeMounts:
        - name: mariadb-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mariadb-storage
        persistentVolumeClaim:
          claimName: mariadb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-service
spec:
  type: LoadBalancer
  selector:
    app: mariadb
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306