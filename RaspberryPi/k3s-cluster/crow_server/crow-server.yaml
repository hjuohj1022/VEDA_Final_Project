# -----------------------------------------------------------
# Crow мӣ№ м„ңлІ„ л°°нҸ¬ (Deployment)
# -----------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crow-server
  template:
    metadata:
      labels:
        app: crow-server
    spec:
      # нҢҢмқјмқҙ мһҲлҠ” л…ёл“ң(pi-worker1)м—җ кі м •
      nodeSelector:
        kubernetes.io/hostname: pi-worker1

      containers:
      - name: crow-server
        image: docker.io/hjuohj/crow-server:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8080
        # Internal-only thermal UDP input.
        # The external hardware now connects to nginx -> thermal-dtls-gateway,
        # and only decrypted thermal UDP reaches crow-server on this port.
        - containerPort: 5005
          protocol: UDP

        # DB м ‘мҶҚ м •ліҙ
        env:
        - name: DB_HOST
          value: "mariadb-service"
        - name: DB_USER
          value: "veda_user"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: user-password

        # SUNAPI н”„лЎқмӢң лҢҖмғҒ м •ліҙ (Gitм—җлҠ” мӢӨк°’ лҜём ҖмһҘ)
        - name: SUNAPI_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: crow-sunapi-config
              key: SUNAPI_BASE_URL
        - name: SUNAPI_INSECURE
          valueFrom:
            configMapKeyRef:
              name: crow-sunapi-config
              key: SUNAPI_INSECURE
        - name: SUNAPI_WS_URL
          valueFrom:
            configMapKeyRef:
              name: crow-sunapi-config
              key: SUNAPI_WS_URL
        - name: SUNAPI_TIMEOUT_MS
          valueFrom:
            configMapKeyRef:
              name: crow-sunapi-config
              key: SUNAPI_TIMEOUT_MS
        - name: SUNAPI_USER
          valueFrom:
            secretKeyRef:
              name: crow-sunapi-secret
              key: SUNAPI_USER
        - name: SUNAPI_PASSWORD
          valueFrom:
            secretKeyRef:
              name: crow-sunapi-secret
              key: SUNAPI_PASSWORD

        # CCTV л°ұм—”л“ң (3D лҚ°мқҙн„° м—°мӮ° м—”м§„) м ‘мҶҚ м •ліҙ
        - name: CCTV_BACKEND_HOST
          valueFrom:
            configMapKeyRef:
              name: crow-cctv-ip-config
              key: CCTV_BACKEND_HOST
        - name: CCTV_BACKEND_PORT
          valueFrom:
            configMapKeyRef:
              name: crow-cctv-ip-config
              key: CCTV_BACKEND_PORT

        # ThermalProxy keeps listening on the same internal UDP port.
        # The DTLS gateway forwards decrypted thermal payloads here.
        - name: THERMAL_UDP_BIND_HOST
          value: "0.0.0.0"
        - name: THERMAL_UDP_PORT
          value: "5005"

        - name: MAIL_APP_SCRIPT_URL
          valueFrom:
            secretKeyRef:
              name: crow-mail-secret
              key: MAIL_APP_SCRIPT_URL
        - name: MAIL_SHARED_SECRET
          valueFrom:
            secretKeyRef:
              name: crow-mail-secret
              key: MAIL_SHARED_SECRET
        - name: MAIL_APP_SCRIPT_TIMEOUT_MS
          valueFrom:
            secretKeyRef:
              name: crow-mail-secret
              key: MAIL_APP_SCRIPT_TIMEOUT_MS
        - name: ADMIN_UNLOCK_KEY
          valueFrom:
            secretKeyRef:
              name: crow-admin-secret
              key: ADMIN_UNLOCK_KEY

        # Thermal event demo tuning
        - name: THERMAL_EVENT_COMPONENT_AREA_MAX
          value: "1024"
        - name: THERMAL_EVENT_CONSECUTIVE_FRAMES
          value: "1"
        - name: THERMAL_EVENT_CLEAR_FRAMES
          value: "2"

        # л§ҲмҡҙнҠё
        volumeMounts:
        - name: recordings
          mountPath: /app/recordings
        - name: certs
          mountPath: /app/certs
          readOnly: true

      volumes:
      - name: recordings
        # PVC лҢҖмӢ  нҳёмҠӨнҠё кІҪлЎң м§Ғм ‘ мӮ¬мҡ© (MediaMTXмҷҖ кіөмң )
        hostPath:
          path: /home/pi/cctv-recordings
          type: DirectoryOrCreate
      - name: certs
        secret:
          secretName: crow-certs
          items:
          - key: rootCA.crt
            path: rootCA.crt
          - key: cctv.crt
            path: cctv.crt
          - key: cctv.key
            path: cctv.key

---
# -----------------------------------------------------------
# мҷёл¶Җ м ‘мҶҚмҡ© м„ңл№„мҠӨ (Service)
# -----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: crow-server-service
spec:
  # лӮҙл¶Җ м „мҡ© IP н• лӢ№ (Nginx GatewayлҘј нҶөн•ҙм„ңл§Ң м ‘к·ј к°ҖлҠҘ)
  type: ClusterIP
  selector:
    app: crow-server
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    # Internal-only thermal UDP service for the DTLS gateway -> crow-server hop.
    - name: thermal-udp
      protocol: UDP
      port: 5005
      targetPort: 5005