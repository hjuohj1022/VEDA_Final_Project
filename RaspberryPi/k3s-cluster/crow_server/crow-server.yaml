# -----------------------------------------------------------
# Crow 웹 서버 배포 (Deployment)
# -----------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crow-server
  template:
    metadata:
      labels:
        app: crow-server
    spec:
      # 파일이 있는 노드(pi-worker1)에 고정
      nodeSelector:
        kubernetes.io/hostname: pi-worker1

      containers:
      - name: crow-server
        image: docker.io/hjuohj/crow-server:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8080
        # Internal-only thermal UDP input.
        # The external hardware now connects to nginx -> thermal-dtls-gateway,
        # and only decrypted thermal UDP reaches crow-server on this port.
        - containerPort: 5005
          protocol: UDP

        # DB 접속 정보
        env:
        - name: DB_HOST
          value: "mariadb-service"
        - name: DB_USER
          value: "veda_user"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: user-password

        # SUNAPI 프록시 대상 정보 (Git에는 실값 미저장)
        - name: SUNAPI_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: crow-sunapi-config
              key: SUNAPI_BASE_URL
        - name: SUNAPI_INSECURE
          valueFrom:
            configMapKeyRef:
              name: crow-sunapi-config
              key: SUNAPI_INSECURE
        - name: SUNAPI_WS_URL
          valueFrom:
            configMapKeyRef:
              name: crow-sunapi-config
              key: SUNAPI_WS_URL
        - name: SUNAPI_TIMEOUT_MS
          valueFrom:
            configMapKeyRef:
              name: crow-sunapi-config
              key: SUNAPI_TIMEOUT_MS
        - name: SUNAPI_USER
          valueFrom:
            secretKeyRef:
              name: crow-sunapi-secret
              key: SUNAPI_USER
        - name: SUNAPI_PASSWORD
          valueFrom:
            secretKeyRef:
              name: crow-sunapi-secret
              key: SUNAPI_PASSWORD

        # CCTV 백엔드 (3D 데이터 연산 엔진) 접속 정보
        - name: CCTV_BACKEND_HOST
          valueFrom:
            configMapKeyRef:
              name: crow-cctv-ip-config
              key: CCTV_BACKEND_HOST
        - name: CCTV_BACKEND_PORT
          valueFrom:
            configMapKeyRef:
              name: crow-cctv-ip-config
              key: CCTV_BACKEND_PORT

        # ThermalProxy keeps listening on the same internal UDP port.
        # The DTLS gateway forwards decrypted thermal payloads here.
        - name: THERMAL_UDP_BIND_HOST
          value: "0.0.0.0"
        - name: THERMAL_UDP_PORT
          value: "5005"

        - name: MOTOR_EMERGENCY_SCRIPT
          value: "motor2 set 30; motor2 set 47; motor3 set 104; motor2 set 55; motor3 set 77; motor2 set 65; motor3 set 90; motor2 set 70;"

        - name: MAIL_APP_SCRIPT_URL
          valueFrom:
            secretKeyRef:
              name: crow-mail-secret
              key: MAIL_APP_SCRIPT_URL
        - name: MAIL_SHARED_SECRET
          valueFrom:
            secretKeyRef:
              name: crow-mail-secret
              key: MAIL_SHARED_SECRET
        - name: MAIL_APP_SCRIPT_TIMEOUT_MS
          valueFrom:
            secretKeyRef:
              name: crow-mail-secret
              key: MAIL_APP_SCRIPT_TIMEOUT_MS
        - name: ADMIN_UNLOCK_KEY
          valueFrom:
            secretKeyRef:
              name: crow-admin-secret
              key: ADMIN_UNLOCK_KEY

        # Thermal event demo tuning
        - name: THERMAL_EVENT_COMPONENT_AREA_MAX
          value: "1400"
        - name: THERMAL_EVENT_CONSECUTIVE_FRAMES
          value: "1"
        - name: THERMAL_EVENT_CLEAR_FRAMES
          value: "2"

        # 마운트
        volumeMounts:
        - name: recordings
          mountPath: /app/recordings
        - name: certs
          mountPath: /app/certs
          readOnly: true

      volumes:
      - name: recordings
        # PVC 대신 호스트 경로 직접 사용 (MediaMTX와 공유)
        hostPath:
          path: /home/pi/cctv-recordings
          type: DirectoryOrCreate
      - name: certs
        secret:
          secretName: crow-certs
          items:
          - key: rootCA.crt
            path: rootCA.crt
          - key: cctv.crt
            path: cctv.crt
          - key: cctv.key
            path: cctv.key

---
# -----------------------------------------------------------
# 외부 접속용 서비스 (Service)
# -----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: crow-server-service
spec:
  # 내부 전용 IP 할당 (Nginx Gateway를 통해서만 접근 가능)
  type: ClusterIP
  selector:
    app: crow-server
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    # Internal-only thermal UDP service for the DTLS gateway -> crow-server hop.
    - name: thermal-udp
      protocol: UDP
      port: 5005
      targetPort: 5005
