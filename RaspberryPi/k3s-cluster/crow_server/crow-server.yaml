apiVersion: apps/v1
kind: Deployment
metadata:
  name: crow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crow-server
  template:
    metadata:
      labels:
        app: crow-server
    spec:
      # 
      nodeSelector:
        kubernetes.io/hostname: pi-worker1
      
      containers:
      - name: crow-server
        image: docker.io/hjuohj/crow-server:latest
        imagePullPolicy: Always 
        
        ports:
        - containerPort: 8080
        
        # DB 접속 정보 
        env:
        - name: DB_HOST
          value: "mariadb-service"
        - name: DB_USER
          value: "veda_user"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: user-password

        # MediaMTX가 녹화한 폴더를 내 폴더처럼 연결
        volumeMounts:
        - name: recordings
          mountPath: /recordings  
          readOnly: true

      volumes:
      - name: recordings
        persistentVolumeClaim:
          claimName: recording-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: crow-server-service
spec:
  type: LoadBalancer
  selector:
    app: crow-server
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080