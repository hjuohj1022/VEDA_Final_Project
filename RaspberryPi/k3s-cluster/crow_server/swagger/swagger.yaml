openapi: 3.0.0
info:
  title: Crow Server API (VEDA Project)
  description: CCTV 녹화, SUNAPI 연동, 모터 제어, ESP32 상태 확인을 제공하는 서버 API
  version: 1.0.0
servers:
  - url: https://192.168.55.200/
    description: 개발 서버

paths:
  /register:
    post:
      summary: 사용자 회원가입
      description: ID와 비밀번호를 받아 새 사용자를 등록합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - password
              properties:
                id:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: 회원가입 성공
        '400':
          description: JSON 형식 오류 또는 필수 파라미터 누락
        '409':
          description: 이미 존재하는 ID
          content:
            text/plain:
              example: 'Registration Failed: ID already exists'
        '500':
          description: 데이터베이스 오류로 회원가입 실패
          content:
            text/plain:
              example: 'Registration Failed: DB error'

  /login:
    post:
      summary: 사용자 로그인 및 JWT 발급
      description: |
        로그인 테스트의 시작점입니다.
        2FA가 비활성화된 계정은 최종 JWT를 바로 반환합니다.
        2FA가 활성화된 계정은 최종 JWT 대신 'pre_auth_token'을 반환하며,
        이 경우 '/2fa/verify'에 OTP를 보내서 최종 로그인을 완료해야 합니다.
      requestBody:
        required: true
        description: |
          먼저 이 요청을 실행해서 계정의 기본 인증 상태를 확인합니다.
          응답에 'token'이 있으면 로그인 완료,
          'pre_auth_token'이 있으면 OTP 추가 인증이 필요한 상태입니다.
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - password
              properties:
                id:
                  type: string
                  example: testuser
                password:
                  type: string
                  example: testpw1234
            examples:
              basicLogin:
                summary: 기본 로그인 요청
                value:
                  id: testuser
                  password: testpw1234
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  requires_2fa:
                    type: boolean
                  token:
                    type: string
                  pre_auth_token:
                    type: string
                  expires_in:
                    type: integer
              examples:
                without2fa:
                  summary: 2FA 비활성 사용자 로그인 성공
                  value:
                    status: success
                    requires_2fa: false
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.full_access_token
                with2fa:
                  summary: 비밀번호 통과 후 OTP 필요
                  value:
                    status: 2fa_required
                    requires_2fa: true
                    pre_auth_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.pre_auth_token
                    expires_in: 300
        '401':
          description: 인증 실패
          content:
            text/plain:
              example: 'Login Failed: Check ID or Password'

  /2fa/setup/init:
    post:
      summary: Start TOTP 2FA setup
      description: |
        TOTP 2FA 설정을 시작합니다.
        이 요청은 이미 로그인된 상태의 최종 JWT가 필요합니다.
        응답으로 받은 'manual_key'를 Google Authenticator 등에 등록하고,
        이어서 '/2fa/setup/confirm'으로 첫 OTP를 확인하면 2FA가 활성화됩니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending 2FA setup created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  manual_key:
                    type: string
                  otpauth_url:
                    type: string
                  expires_in:
                    type: integer
              example:
                status: pending
                manual_key: JBSWY3DPEHPK3PXP
                otpauth_url: otpauth://totp/VEDA%3Atestuser?secret=JBSWY3DPEHPK3PXP&issuer=VEDA&algorithm=SHA1&digits=6&period=30
                expires_in: 300
        '401':
          description: Unauthorized
          content:
            text/plain:
              example: Unauthorized
        '409':
          description: 2FA already enabled
          content:
            text/plain:
              example: 2FA is already enabled

  /2fa/status:
    get:
      summary: Get current TOTP 2FA status
      description: |
        현재 로그인한 사용자의 TOTP 2FA 활성화 여부를 조회합니다.
        프로필 메뉴를 열 때 이 값을 확인해 'OTP 생성' 또는 'OTP 삭제'를 분기하는 용도로 사용할 수 있습니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 2FA status loaded
          content:
            application/json:
              example:
                status: success
                two_factor_enabled: true
                has_pending_setup: false
                pending_expires_in: 0
        '401':
          description: Unauthorized
          content:
            text/plain:
              example: Unauthorized
        '404':
          description: User not found
          content:
            text/plain:
              example: User not found

  /2fa/setup/confirm:
    post:
      summary: Confirm TOTP 2FA setup
      description: |
        '/2fa/setup/init'으로 받은 secret을 앱에 등록한 뒤,
        앱에 표시된 첫 6자리 OTP를 보내 2FA를 최종 활성화합니다.
        Authorization 헤더에는 최종 JWT가 필요합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - otp
              properties:
                otp:
                  type: string
                  example: '123456'
            examples:
              confirmSetup:
                summary: 앱에 표시된 첫 OTP
                value:
                  otp: '123456'
      responses:
        '200':
          description: 2FA enabled
          content:
            application/json:
              example:
                status: success
                two_factor_enabled: true
        '400':
          description: Missing or invalid setup state
          content:
            text/plain:
              examples:
                missingOtp:
                  summary: 요청 바디에 otp가 없음
                  value: Missing otp
                noPendingSetup:
                  summary: setup/init을 먼저 하지 않음
                  value: No pending 2FA setup found
        '401':
          description: Invalid OTP
          content:
            text/plain:
              example: Invalid OTP
        '410':
          description: Pending setup expired
          content:
            text/plain:
              example: Pending 2FA setup expired

  /2fa/verify:
    post:
      summary: Verify OTP after password login
      description: |
        '/login' 결과가 'requires_2fa=true'일 때 사용하는 2차 인증 엔드포인트입니다.
        '/login'에서 받은 'pre_auth_token'과 현재 OTP를 보내면
        최종 JWT를 발급받을 수 있습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pre_auth_token
                - otp
              properties:
                pre_auth_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.pre_auth_token
                otp:
                  type: string
                  example: '123456'
            examples:
              verify2fa:
                summary: pre_auth_token과 OTP로 최종 JWT 발급
                value:
                  pre_auth_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.pre_auth_token
                  otp: '123456'
      responses:
        '200':
          description: OTP verified and JWT issued
          content:
            application/json:
              example:
                status: success
                requires_2fa: false
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.full_access_token
        '400':
          description: Missing request field or 2FA not enabled
          content:
            text/plain:
              examples:
                missingBody:
                  summary: pre_auth_token 또는 otp 누락
                  value: Missing pre_auth_token or otp
                notEnabled:
                  summary: 계정에 2FA가 켜져 있지 않음
                  value: 2FA is not enabled
        '401':
          description: Invalid pre_auth_token or OTP
          content:
            text/plain:
              examples:
                invalidToken:
                  summary: pre_auth_token이 만료되었거나 유효하지 않음
                  value: Invalid pre-auth token
                invalidOtp:
                  summary: OTP가 일치하지 않음
                  value: Invalid OTP
        '404':
          description: User not found
          content:
            text/plain:
              example: User not found

  /2fa/disable:
    post:
      summary: Disable TOTP 2FA
      description: |
        현재 로그인한 사용자의 TOTP 2FA를 비활성화합니다.
        Authorization 헤더에는 최종 JWT가 필요하며,
        현재 Authenticator 앱에 표시되는 OTP도 함께 보내야 합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - otp
              properties:
                otp:
                  type: string
                  example: '123456'
            examples:
              disable2fa:
                summary: 현재 OTP로 2FA 비활성화
                value:
                  otp: '123456'
      responses:
        '200':
          description: 2FA disabled
          content:
            application/json:
              example:
                status: success
                two_factor_enabled: false
        '400':
          description: Missing OTP or 2FA already disabled
          content:
            text/plain:
              examples:
                missingOtp:
                  summary: otp 누락
                  value: Missing otp
                alreadyDisabled:
                  summary: 이미 2FA가 꺼져 있음
                  value: 2FA is already disabled
        '401':
          description: Unauthorized or invalid OTP
          content:
            text/plain:
              examples:
                unauthorized:
                  summary: JWT가 없거나 유효하지 않음
                  value: Unauthorized
                invalidOtp:
                  summary: OTP가 일치하지 않음
                  value: Invalid OTP
        '404':
          description: User not found
          content:
            text/plain:
              example: User not found

  /account/delete:
    post:
      summary: Delete current account
      description: |
        Deletes the currently authenticated account.
        The caller must always re-enter the current password.
        If TOTP 2FA is enabled for the account, the current OTP code must also be provided.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  example: testpw1234
                otp:
                  type: string
                  description: Required only when 2FA is enabled for the account.
                  example: '123456'
            examples:
              without2fa:
                summary: Delete account without OTP
                value:
                  password: testpw1234
              with2fa:
                summary: Delete account with OTP
                value:
                  password: testpw1234
                  otp: '123456'
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              example:
                status: success
                deleted: true
        '400':
          description: Missing or invalid request field
          content:
            text/plain:
              examples:
                missingPassword:
                  summary: password is missing
                  value: Missing password
                missingOtp:
                  summary: otp is required because 2FA is enabled
                  value: Missing otp
        '401':
          description: Unauthorized, invalid password, or invalid OTP
          content:
            text/plain:
              examples:
                unauthorized:
                  summary: JWT is missing or invalid
                  value: Unauthorized
                invalidPassword:
                  summary: password does not match the current account
                  value: Invalid password
                invalidOtp:
                  summary: otp does not match the authenticator app
                  value: Invalid OTP
        '404':
          description: User not found
          content:
            text/plain:
              example: User not found
        '500':
          description: Database or delete operation failure
          content:
            text/plain:
              example: Failed to delete user

  /recordings:
    get:
      summary: MP4 녹화 파일 목록 조회
      description: 서버에 저장된 MP4 녹화 파일 목록을 반환합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 조회 성공
        '401':
          description: 인증되지 않음
    delete:
      summary: 녹화 파일 삭제
      description: 파일명을 기준으로 지정한 녹화 파일을 삭제합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
          description: "삭제할 파일명 예시 'recording_1.mp4'"
      responses:
        '200':
          description: 삭제 성공
        '404':
          description: 파일을 찾을 수 없음

  /stream:
    get:
      summary: 녹화 영상 스트리밍
      description: Range 요청을 지원하는 MP4 스트리밍 API입니다.
      security:
        - bearerAuth: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
      responses:
        '206':
          description: 부분 콘텐츠 응답

  /system/storage:
    get:
      summary: 시스템 저장소 사용량 조회
      description: 녹화 저장소 기준 전체, 사용, 가용 용량을 반환합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_bytes:
                    type: integer
                  used_bytes:
                    type: integer
                  available_bytes:
                    type: integer
        '401':
          description: 인증되지 않음

  /api/sunapi/storage:
    get:
      summary: 카메라 저장소 정보 조회
      description: SUNAPI 프록시를 통해 카메라 저장소 원본 응답을 전달합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: SUNAPI 응답 전달 성공
        '401':
          description: 인증되지 않음
        '502':
          description: 업스트림 카메라 연동 오류

  /api/sunapi/timeline:
    get:
      summary: 날짜별 재생 타임라인 조회
      description: 채널과 날짜를 기준으로 녹화 타임라인을 조회합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
            example: '2026-03-05'
      responses:
        '200':
          description: SUNAPI 응답 전달 성공
        '400':
          description: 쿼리 파라미터 누락 또는 형식 오류
        '401':
          description: 인증되지 않음
        '502':
          description: 업스트림 카메라 연동 오류

  /api/sunapi/month-days:
    get:
      summary: 월별 녹화 존재 일자 조회
      description: 지정한 연월에 녹화가 존재하는 날짜 목록을 조회합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: SUNAPI 응답 전달 성공
        '400':
          description: 쿼리 파라미터 누락 또는 형식 오류
        '401':
          description: 인증되지 않음
        '502':
          description: 업스트림 카메라 연동 오류

  /api/sunapi/export/create:
    get:
      summary: 재생 구간 export 작업 생성
      description: 지정한 시간 구간을 export하기 위한 SUNAPI 작업을 생성합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
        - name: start_time
          in: query
          required: true
          schema:
            type: string
            example: '2026-03-06 08:36:41'
        - name: end_time
          in: query
          required: true
          schema:
            type: string
            example: '2026-03-06 08:41:41'
        - name: format
          in: query
          required: false
          schema:
            type: string
            example: AVI
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [default, backup, start]
      responses:
        '200':
          description: SUNAPI 응답 전달 성공
        '400':
          description: 쿼리 파라미터 누락 또는 형식 오류
        '401':
          description: 인증되지 않음
        '502':
          description: 업스트림 카메라 연동 오류

  /api/sunapi/export/status:
    get:
      summary: export 작업 상태 조회
      description: 생성된 export 작업의 진행 상태를 조회합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [default, backup, start]
      responses:
        '200':
          description: SUNAPI 응답 전달 성공
        '400':
          description: 쿼리 파라미터 누락 또는 형식 오류
        '401':
          description: 인증되지 않음
        '502':
          description: 업스트림 카메라 연동 오류

  /api/sunapi/export/download:
    get:
      summary: export 결과 다운로드
      description: 작업 ID를 기준으로 생성된 export 파일을 다운로드합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [default, backup, start]
      responses:
        '200':
          description: export 바이너리 응답 전달 성공
        '400':
          description: 쿼리 파라미터 누락 또는 형식 오류
        '401':
          description: 인증되지 않음
        '502':
          description: 업스트림 카메라 연동 오류

  /api/sunapi/ptz/focus:
    post:
      summary: PTZ Focus/Zoom 제어
      description: 고정 명령 세트를 사용해 줌 및 포커스 동작을 제어합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
            example: 0
        - name: command
          in: query
          required: true
          schema:
            type: string
            enum: [zoom_in, zoom_out, zoom_stop, focus_near, focus_far, focus_stop, autofocus]
      responses:
        '200':
          description: SUNAPI 응답 전달 성공
        '400':
          description: 쿼리 파라미터 누락 또는 형식 오류
        '401':
          description: 인증되지 않음
        '502':
          description: 업스트림 카메라 연동 오류

  /api/sunapi/display/settings:
    get:
      summary: 영상 표시 설정 조회
      description: contrast, brightness, sharpness, saturation 설정을 조회합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
            example: 0
      responses:
        '200':
          description: SUNAPI 응답 전달 성공
        '400':
          description: 쿼리 파라미터 누락 또는 형식 오류
        '401':
          description: 인증되지 않음
        '502':
          description: 업스트림 카메라 연동 오류
    post:
      summary: 영상 표시 설정 변경
      description: UserPreset1 기준으로 영상 표시 설정 값을 변경합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
            example: 0
        - name: contrast
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: brightness
