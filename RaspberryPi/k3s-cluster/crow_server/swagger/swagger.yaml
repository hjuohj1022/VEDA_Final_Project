openapi: 3.0.0
info:
  title: Crow Server API (VEDA Project)
  description: CCTV Recording and Management System API
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local Test Server
paths:
  /register:
    post:
      summary: User Registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Registration successful
        '400':
          description: Invalid JSON or missing parameters
        '409':
          description: ID already exists
  /login:
    post:
      summary: User Login (JWT Issue)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Authentication failed
  /recordings:
    get:
      summary: Get MP4 recording list
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
    delete:
      summary: Delete recording file
      security:
        - bearerAuth: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
          description: Filename to delete (e.g., recording_1.mp4)
      responses:
        '200':
          description: Deleted
        '404':
          description: Not Found
  /stream:
    get:
      summary: Video Streaming (Range support)
      security:
        - bearerAuth: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
      responses:
        '206':
          description: Partial Content
  /system/storage:
    get:
      summary: Get system storage usage
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_bytes:
                    type: integer
                  used_bytes:
                    type: integer
                  available_bytes:
                    type: integer
        '401':
          description: Unauthorized
  /health:
    get:
      summary: Server health check
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
