      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - motor
              properties:
                motor:
                  type: integer
                  minimum: 1
                  maximum: 3
      responses:
        '200':
          description: 모터 응답 수신 성공
        '400':
