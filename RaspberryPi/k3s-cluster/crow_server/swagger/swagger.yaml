openapi: 3.0.0
info:
  title: Crow Server API (VEDA Project)
  description: CCTV Recording and Management System API
  version: 1.0.0
servers:
  - url: https://192.168.55.200/
    description: Development Server
paths:
  /register:
    post:
      summary: User Registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Registration successful
        '400':
          description: Invalid JSON or missing parameters
        '409':
          description: ID already exists
  /login:
    post:
      summary: User Login (JWT Issue)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Authentication failed
  /recordings:
    get:
      summary: Get MP4 recording list
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
    delete:
      summary: Delete recording file
      security:
        - bearerAuth: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
          description: Filename to delete (e.g., recording_1.mp4)
      responses:
        '200':
          description: Deleted
        '404':
          description: Not Found
  /stream:
    get:
      summary: Video Streaming (Range support)
      security:
        - bearerAuth: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
      responses:
        '206':
          description: Partial Content
  /system/storage:
    get:
      summary: Get system storage usage
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_bytes:
                    type: integer
                  used_bytes:
                    type: integer
                  available_bytes:
                    type: integer
        '401':
          description: Unauthorized
  /api/sunapi/storage:
    get:
      summary: Camera storage raw payload via SUNAPI proxy
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Forwarded SUNAPI payload
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
  /api/sunapi/timeline:
    get:
      summary: Playback timeline by date
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
            example: "2026-03-05"
      responses:
        '200':
          description: Forwarded SUNAPI payload
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
  /api/sunapi/month-days:
    get:
      summary: Playback month recorded days
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Forwarded SUNAPI payload
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
  /api/sunapi/export/create:
    get:
      summary: Create playback export job
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
        - name: start_time
          in: query
          required: true
          schema:
            type: string
            example: "2026-03-06 08:36:41"
        - name: end_time
          in: query
          required: true
          schema:
            type: string
            example: "2026-03-06 08:41:41"
        - name: format
          in: query
          required: false
          schema:
            type: string
            example: AVI
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [default, backup, start]
      responses:
        '200':
          description: Forwarded SUNAPI payload
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
  /api/sunapi/export/status:
    get:
      summary: Poll playback export job status
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [default, backup, start]
      responses:
        '200':
          description: Forwarded SUNAPI payload
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
  /api/sunapi/export/download:
    get:
      summary: Download playback export by job id
      security:
        - bearerAuth: []
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [default, backup, start]
      responses:
        '200':
          description: Forwarded export binary payload
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
  /api/sunapi/ptz/focus:
    post:
      summary: PTZ Focus/Zoom control via fixed command
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
            example: 0
        - name: command
          in: query
          required: true
          schema:
            type: string
            enum: [zoom_in, zoom_out, zoom_stop, focus_near, focus_far, focus_stop, autofocus]
      responses:
        '200':
          description: Forwarded SUNAPI payload
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
  /api/sunapi/display/settings:
    get:
      summary: View image display settings (contrast/brightness/sharpness/saturation)
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
            example: 0
      responses:
        '200':
          description: Forwarded SUNAPI payload
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
    post:
      summary: Set image display settings (UserPreset1)
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
            example: 0
        - name: contrast
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: brightness
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: sharpness_level
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 32
        - name: sharpness_enable
          in: query
          required: true
          schema:
            type: boolean
        - name: color_level
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Forwarded SUNAPI payload
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
  /api/sunapi/display/reset:
    post:
      summary: Reset image display settings to device default (50/50/12/50)
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
            example: 0
      responses:
        '200':
          description: Forwarded SUNAPI payload
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
  /api/sunapi/playback/session:
    get:
      summary: Create playback RTSP-over-WS session payload
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
            example: 0
        - name: date
          in: query
          required: true
          schema:
            type: string
            example: "2026-03-06"
        - name: time
          in: query
          required: true
          schema:
            type: string
            example: "13:36:18"
        - name: rtsp_port
          in: query
          required: false
          schema:
            type: integer
            example: 554
      responses:
        '200':
          description: Session payload generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  Uri:
                    type: string
                  Realm:
                    type: string
                  Nonce:
                    type: string
                  Response:
                    type: string
                  Username:
                    type: string
                  Cnonce:
                    type: string
                  Nc:
                    type: string
                  Method:
                    type: string
                  WsPath:
                    type: string
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '500':
          description: Server config error
        '502':
          description: Upstream error
  /api/sunapi/export/session:
    get:
      summary: Create export RTSP-over-WS session payload
      security:
        - bearerAuth: []
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: integer
            example: 0
        - name: date
          in: query
          required: true
          schema:
            type: string
            example: "2026-03-06"
        - name: start_time
          in: query
          required: true
          schema:
            type: string
            example: "13:36:18"
        - name: end_time
          in: query
          required: true
          schema:
            type: string
            example: "13:41:18"
        - name: rtsp_port
          in: query
          required: false
          schema:
            type: integer
            example: 554
      responses:
        '200':
          description: Session payload generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  Uri:
                    type: string
                  Realm:
                    type: string
                  Nonce:
                    type: string
                  Response:
                    type: string
                  Username:
                    type: string
                  Cnonce:
                    type: string
                  Nc:
                    type: string
                  Method:
                    type: string
                  WsPath:
                    type: string
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '500':
          description: Server config error
        '502':
          description: Upstream error
  /api/sunapi/playback/digestauth:
    get:
      summary: Build digest response for playback RTSP over WS
      security:
        - bearerAuth: []
      parameters:
        - name: method
          in: query
          required: true
          schema:
            type: string
            example: OPTIONS
        - name: realm
          in: query
          required: true
          schema:
            type: string
        - name: nonce
          in: query
          required: true
          schema:
            type: string
        - name: uri
          in: query
          required: true
          schema:
            type: string
        - name: cnonce
          in: query
          required: true
          schema:
            type: string
        - name: nc
          in: query
          required: true
          schema:
            type: string
            example: "00000001"
      responses:
        '200':
          description: Forwarded SUNAPI digestauth payload (includes Response)
        '400':
          description: Missing query
        '401':
          description: Unauthorized
        '500':
          description: Server config error
        '502':
          description: Upstream error
  /api/sunapi/playback/challenge:
    get:
      summary: Get RTSP digest challenge (realm/nonce) for playback
      security:
        - bearerAuth: []
      parameters:
        - name: uri
          in: query
          required: true
          schema:
            type: string
            example: "rtsp://192.168.55.16/0/recording/20260306071236/play.smp"
        - name: rtsp_port
          in: query
          required: false
          schema:
            type: integer
            example: 554
      responses:
        '200':
          description: Challenge resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  Realm:
                    type: string
                  Nonce:
                    type: string
        '400':
          description: Missing or invalid query
        '401':
          description: Unauthorized
        '500':
          description: Server config error
        '502':
          description: Upstream error
  /sunapi/stw-cgi/{tail}:
    get:
      summary: Proxy SUNAPI GET request
      description: Forward request to camera SUNAPI with Digest auth
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: path
          required: true
          schema:
            type: string
          description: stw-cgi path tail
      responses:
        '200':
          description: Forwarded response
        '401':
          description: Unauthorized
        '502':
          description: Upstream error
    post:
      summary: Proxy SUNAPI POST request
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Forwarded response
    put:
      summary: Proxy SUNAPI PUT request
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Forwarded response
    delete:
      summary: Proxy SUNAPI DELETE request
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Forwarded response
  /health:
    get:
      summary: Server health check
      responses:
        '200':
          description: OK
  /cctv/control/start:
    post:
      summary: Start CCTV Processing
      description: Start point cloud processing on the backend server.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: integer
                  description: Channel number (0-3)
                mode:
                  type: string
                  description: Execution mode ("headless" or "gui")
      responses:
        '200':
          description: OK
        '202':
          description: Accepted for background execution
        '400':
          description: Invalid request
  /cctv/control/command:
    post:
      summary: Send raw CCTV control command
      description: |
        Pass through a raw command string to the CCTV backend.
        Examples:
        - `pause`
        - `resume`
        - `stop`
        - `channel=0 headless`
        - `channel=1 gui`
        - `pc_view rx=-20 ry=35 flipx=0 flipy=0 flipz=0 wire=1 mesh=0`
        - `depth_stream`
        - `rgbd_stream`
        - `pc_stream`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
      responses:
        '200':
          description: OK
        '202':
          description: Accepted for background execution for non-stream control commands
        '400':
          description: Invalid request
  /cctv/control/stop:
    post:
      summary: Stop CCTV Processing
      responses:
        '200':
          description: OK
        '202':
          description: Accepted for background execution
  /cctv/control/pause:
    post:
      summary: Pause CCTV Processing
      responses:
        '202':
          description: Accepted for background execution
  /cctv/control/resume:
    post:
      summary: Resume CCTV Processing
      responses:
        '202':
          description: Accepted for background execution
  /cctv/control/view:
    post:
      summary: Update View Parameters
      description: Update point cloud view settings (rotation, flip, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rx:
                  type: number
                ry:
                  type: number
                flipx:
                  type: boolean
                flipy:
                  type: boolean
                flipz:
                  type: boolean
                wire:
                  type: boolean
                mesh:
                  type: boolean
      responses:
        '202':
          description: Accepted for background execution
  /cctv/control/stream:
    post:
      summary: Start CCTV stream mode
      description: |
        Select exactly one backend stream command before consuming `/cctv/stream`.
        Choose one of:
        - `pc_stream`: server-rendered PNG stream
        - `rgbd_stream`: depth32f + bgr24 raw stream
        - `depth_stream`: depth32f-only raw stream
        Do not mix multiple stream commands at the same time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - stream
              properties:
                stream:
                  type: string
                  enum: [pc_stream, rgbd_stream, depth_stream]
            examples:
              pcStream:
                summary: Server-rendered point cloud stream
                value:
                  stream: pc_stream
              rgbdStream:
                summary: Raw RGBD stream
                value:
                  stream: rgbd_stream
              depthStream:
                summary: Depth-only raw stream
                value:
                  stream: depth_stream
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
  /cctv/status:
    get:
      summary: Get CCTV Status
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  backend_connected:
                    type: boolean
                  stream_mode:
                    type: integer
                    description: 0 (NONE), 1 (PC_IMAGE), 2 (RGBD_RAW), 3 (DEPTH_RAW)
  /cctv/stream:
    get:
      summary: Point Cloud Stream (WebSocket)
      description: |
        - 서버 렌더링 이미지 (16B Header + Image)
        - 또는 클라이언트용 RGBD 데이터 (20B Header + Depth + BGR)
      responses:
        '101':
          description: Switching Protocols
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
