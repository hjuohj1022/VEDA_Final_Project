openapi: 3.0.0
info:
  title: Crow Server API (VEDA Project)
  description: CCTV Recording and Management System API
  version: 1.0.0
servers:
  - url: https://192.168.55.200/
    description: Production Server (Raspberry Pi)
  - url: http://localhost:8080/
    description: Local Test Server
paths:
  # === 회원가입 ===
  /register:
    post:
      summary: User Registration
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: "team3"
                password:
                  type: string
                  example: "password123"
      responses:
        '201':
          description: Registration successful
        '400':
          description: Invalid JSON or missing parameters
        '409':
          description: ID already exists

  # === 로그인 (JWT 발급) ===
  /login:
    post:
      summary: User Login (Get JWT Token)
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: "team3"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  status:
                    type: string
                    example: "success"
        '401':
          description: Authentication failed

  # === 녹화 영상 관리 ===
  /recordings:
    get:
      summary: Get MP4 recording list
      tags:
        - Recordings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
        '401':
          description: Unauthorized
    delete:
      summary: Delete recording file
      tags:
        - Recordings
      security:
        - bearerAuth: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
            example: "20260303_120000.mp4"
          description: Filename to delete
      responses:
        '200':
          description: Deleted successfully
        '404':
          description: File not found

  # === 스트리밍 ===
  /stream:
    get:
      summary: Video Streaming (Range support)
      tags:
        - Streaming
      security:
        - bearerAuth: []
      parameters:
        - name: file
          in: query
          required: true
          schema:
            type: string
            example: "20260303_120000.mp4"
      responses:
        '206':
          description: Partial Content (Streaming)

  # === 시스템 정보 ===
  /system/storage:
    get:
      summary: Get system storage usage
      tags:
        - System
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_bytes:
                    type: integer
                    format: int64
                    example: 32000000000
                  used_bytes:
                    type: integer
                    format: int64
                    example: 15000000000
                  available_bytes:
                    type: integer
                    format: int64
                    example: 17000000000
        '401':
          description: Unauthorized

  # === 헬스 체크 ===
  /health:
    get:
      summary: Server health check
      tags:
        - System
      responses:
        '200':
          description: OK

# === 보안 설정 (JWT) ===
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT