  /motor/control/command:
    post:
      summary: 원시 모터 명령 전송
      description: |
        'motor/control' 토픽으로 원시 ASCII 명령을 발행하고 다음 'motor/response' 응답을 기다립니다.
        예시:
        - 'motor1 left press'
        - 'motor2 release'
        - 'motor3 set 120'
        - 'read'
        - 'ping'
        - 'stopall'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
      responses:
        '200':
          description: 모터 응답 수신 성공
        '400':
          description: 잘못된 요청 또는 STM32가 ERR 반환
        '503':
          description: MQTT 브로커를 사용할 수 없음
        '504':
          description: 모터 응답 대기 시간 초과

  /motor/control/press:
    post:
