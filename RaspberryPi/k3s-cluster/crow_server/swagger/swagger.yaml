              properties:
                motor:
                  type: integer
                  minimum: 1
                  maximum: 3
                angle:
                  type: integer
                  minimum: 0
                  maximum: 180
      responses:
        '200':
          description: 모터 응답 수신 성공
        '400':
          description: 잘못된 요청 또는 STM32가 ERR 반환
        '503':
