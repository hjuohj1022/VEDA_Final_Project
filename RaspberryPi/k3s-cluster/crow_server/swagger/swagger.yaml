          description: 모터 응답 수신 성공
        '503':
          description: MQTT 브로커를 사용할 수 없음
        '504':
          description: 모터 응답 대기 시간 초과

  /motor/status:
    get:
      summary: 모터 MQTT 브리지 상태 조회
      description: 서버 측 모터 브리지 연결 상태와 최근 응답 정보를 확인합니다.
      responses:
        '200':
          description: 현재 모터 브리지 상태

  /cctv/control/start:
    post:
      summary: CCTV 처리 시작
      description: 백엔드 서버에서 채널별 point cloud 처리 작업을 시작합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: integer
                  description: 채널 번호 (0-3)
                mode:
                  type: string
                  description: "실행 모드 'headless' 또는 'gui'"
      responses:
        '200':
          description: 처리 성공
        '202':
          description: 백그라운드 실행 요청 수락
        '400':
          description: 잘못된 요청

  /cctv/control/command:
    post:
      summary: 원시 CCTV 제어 명령 전송
      description: |
        원시 명령 문자열을 CCTV 백엔드로 그대로 전달합니다.
        예시:
        - 'pause'
        - 'resume'
        - 'stop'
        - 'channel=0 headless'
        - 'channel=1 gui'
        - 'pc_view rx=-20 ry=35 flipx=0 flipy=0 flipz=0 wire=1 mesh=0'
        - 'depth_stream'
        - 'rgbd_stream'
        - 'pc_stream'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
      responses:
        '200':
          description: 처리 성공
        '202':
          description: 스트림 외 제어 명령을 백그라운드 실행으로 수락
        '400':
          description: 잘못된 요청

  /cctv/control/stop:
    post:
      summary: CCTV 처리 중지
      responses:
        '200':
          description: 처리 성공
        '202':
          description: 백그라운드 실행 요청 수락

  /cctv/control/pause:
    post:
      summary: CCTV 처리 일시정지
      responses:
        '202':
          description: 백그라운드 실행 요청 수락

  /cctv/control/resume:
    post:
      summary: CCTV 처리 재개
      responses:
        '202':
          description: 백그라운드 실행 요청 수락

  /cctv/control/view:
    post:
      summary: 뷰 파라미터 변경
      description: |
        point cloud 뷰 설정(rotation, flip 등)을 변경합니다.
        'rx' 또는 'ry'가 포함된 요청은 500ms마다 한 번만 수락됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rx:
                  type: number
                ry:
                  type: number
                flipx:
                  type: boolean
                flipy:
                  type: boolean
                flipz:
                  type: boolean
                wire:
                  type: boolean
                mesh:
                  type: boolean
      responses:
        '202':
          description: "백그라운드 실행 수락 또는 'status=THROTTLED' 제한 응답"

  /cctv/control/stream:
    post:
      summary: CCTV 스트림 모드 시작
      description: |
        '/cctv/stream' 사용 전에 백엔드 스트림 명령 하나를 먼저 선택합니다.
        다음 중 하나만 선택해야 합니다.
        - 'pc_stream': 서버 렌더링 PNG 스트림
        - 'rgbd_stream': depth32f + bgr24 원시 스트림
        - 'depth_stream': depth32f 전용 원시 스트림
        동시에 여러 스트림 명령을 혼합해서 사용하지 마십시오.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - stream
              properties:
                stream:
                  type: string
                  enum: [pc_stream, rgbd_stream, depth_stream]
            examples:
              pcStream:
                summary: 서버 렌더링 point cloud 스트림
                value:
                  stream: pc_stream
              rgbdStream:
                summary: 원시 RGBD 스트림
                value:
                  stream: rgbd_stream
              depthStream:
                summary: Depth 전용 원시 스트림
                value:
                  stream: depth_stream
      responses:
        '200':
          description: 처리 성공
        '400':
          description: 잘못된 요청

  /cctv/status:
    get:
      summary: CCTV 상태 조회
      description: 백엔드 연결 여부와 현재 스트림 모드 상태를 반환합니다.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  backend_connected:
                    type: boolean
                  stream_mode:
                    type: integer
                    description: "'0=NONE', '1=PC_IMAGE', '2=RGBD_RAW', '3=DEPTH_RAW'"

  /cctv/stream:
    get:
      summary: Point Cloud 스트림 (WebSocket)
      description: |
        WebSocket으로 CCTV 바이너리 스트림을 수신합니다.
        스트림 모드에 따라 다음 형식 중 하나가 전달됩니다.
        - PC 이미지 스트림: '16B Header + Image'
        - RGBD 스트림: '20B Header + Depth + BGR'
        - Depth 전용 스트림: '16B Header + Depth'
      responses:
        '101':
          description: WebSocket 프로토콜 전환

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
