name: Jira Auto Issue

on:
  pull_request:
    branches:
      - develop
    types: [closed]

jobs:
  create-jira-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1пёҸвғЈ ліҖкІҪ нҢҢмқј лӘ©лЎқ к°Җм ёмҳӨкё°
      - name: Get Changed Files
        id: files
        run: |
          FILES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            | jq -r '.[].filename')

          echo "FILES<<EOF" >> $GITHUB_ENV
          echo "$FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 2пёҸвғЈ Jira мқҙмҠҲ мғқм„ұ
      - name: Create Jira Issue
        id: jira
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          BODY="${{ github.event.pull_request.body }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          DESCRIPTION=$(printf "PR л§ҒнҒ¬: %s\n\nмһ‘м—… лӮҙмҡ©:\n%s\n\nліҖкІҪ нҢҢмқј:\n%s" "$PR_URL" "$BODY" "$FILES")

          RESPONSE=$(curl -s -X POST \
            -u ${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }} \
            -H "Content-Type: application/json" \
            https://${{ secrets.JIRA_DOMAIN }}/rest/api/3/issue \
            --data "{
              \"fields\": {
                \"project\": { \"key\": \"${{ secrets.JIRA_PROJECT }}\" },
                \"summary\": \"$TITLE\",
                \"issuetype\": { \"name\": \"Task\" },
                \"description\": {
                  \"type\": \"doc\",
                  \"version\": 1,
                  \"content\": [{
                    \"type\": \"paragraph\",
                    \"content\": [{
                      \"type\": \"text\",
                      \"text\": \"$DESCRIPTION\"
                    }]
                  }]
                }
              }
            }")

          ISSUE_KEY=$(echo $RESPONSE | jq -r '.key')
          echo "ISSUE_KEY=$ISSUE_KEY" >> $GITHUB_ENV

      # 3пёҸвғЈ summaryм—җ KAN-XXX мһҗлҸҷ нҸ¬н•Ё
      - name: Update Summary With Issue Key
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          curl -s -X PUT \
            -u ${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }} \
            -H "Content-Type: application/json" \
            https://${{ secrets.JIRA_DOMAIN }}/rest/api/3/issue/${{ env.ISSUE_KEY }} \
            --data "{
              \"fields\": {
                \"summary\": \"${{ env.ISSUE_KEY }} $TITLE\"
              }
            }"
